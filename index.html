<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Session Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1, h2 { color: #333; margin-bottom: 15px; }
        .method-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .method-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #667eea;
            background: white;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
        }
        .method-btn.active {
            background: #667eea;
            color: white;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background: #5a67d8; }
        .qr-container {
            text-align: center;
            margin: 20px 0;
        }
        .status {
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .status.connected { background: #d4edda; color: #155724; }
        .status.connecting { background: #fff3cd; color: #856404; }
        .session-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .session-actions button {
            margin-left: 10px;
            padding: 5px 10px;
            font-size: 12px;
        }
        .pairing-code {
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            padding: 20px;
            background: #f0f0f0;
            border-radius: 10px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>WhatsApp Session Manager</h1>
            
            <div class="method-selector">
                <button class="method-btn active" onclick="selectMethod('qr')">QR Code Method</button>
                <button class="method-btn" onclick="selectMethod('phone')">Phone Number Method</button>
            </div>
            
            <div id="qrMethod" class="method-content">
                <div class="form-group">
                    <label>Session ID (unique name for this session)</label>
                    <input type="text" id="sessionIdQR" placeholder="e.g., my_whatsapp_bot">
                </div>
                <button onclick="createSession('qr')">Create Session with QR Code</button>
            </div>
            
            <div id="phoneMethod" class="method-content" style="display:none;">
                <div class="form-group">
                    <label>Session ID (unique name for this session)</label>
                    <input type="text" id="sessionIdPhone" placeholder="e.g., my_whatsapp_bot">
                </div>
                <div class="form-group">
                    <label>Phone Number (international format, no + or spaces)</label>
                    <input type="text" id="phoneNumber" placeholder="e.g., 12345678901">
                </div>
                <button onclick="createSession('phone')">Request Pairing Code</button>
            </div>
            
            <div id="sessionStatus"></div>
        </div>
        
        <div class="card">
            <h2>Saved Sessions</h2>
            <div id="sessionsList"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
